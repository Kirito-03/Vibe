server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Nueva regla para imágenes y estáticos
  location ~* \.(?:ico|css|js|gif|jpe?g|png)$ {
    expires max;
    add_header Cache-Control "public, must-revalidate, proxy-revalidate";
    access_log off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
